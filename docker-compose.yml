services:
  postgres_db:
    image: postgres:16-alpine
    container_name: gorm_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pg_api_data:/var/lib?postgresql/data
    
  web_app:
    build: .
    container_name: gorm_web_api
    ports:
      - "${APP_PORT}:${APP_PORT}"
    env_file:
      - .env
    depends_on:
      postgres_db:
        condition: service_started

volumes:
  pg_api_data: